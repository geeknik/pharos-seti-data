        reference: "MNRAS Letters (e-MERLIN/EVN follow-up)"
        notes: "Radio emission resolves into compact background components with brightness temperature characteristic of a radio-loud AGN; no radio emission detected at the M-dwarf Gaia position. The mid-IR excess previously attributed to candidate G is confirmed background AGN contamination."


# Hephaistos candidate registry
#
# The seven M-dwarf candidates with anomalous WISE W3/W4 infrared excess
# identified in Suazo et al. (2024), "Project Hephaistos II: Dyson sphere
# candidates from Gaia DR3, 2MASS, and WISE," MNRAS 531, 695-707
# (https://doi.org/10.1093/mnras/stae1186).
#
# Source: Table 5 (DS candidates) and Table 7 (W1/W2 and W1/W3 offsets) of
# Suazo et al. (2024).
#
# This file is the operational target of the Pharos v0.1 benchmark. The
# pass criterion in pre_registration/v0.1_ir_benchmark.md §7 references
# the labels assigned here.
#
# Status labels:
#   contaminant_confirmed   — background contamination confirmed at
#                              high resolution (e.g., e-MERLIN/EVN)
#   contaminant_suspected   — radio-source offsets or other archival
#                              evidence suggests background contamination;
#                              high-resolution follow-up pending
#   unresolved_stress_test  — no archival contamination evidence either
#                              way; pipeline must not promote without
#                              independent modality survival
#
# Schema notes:
#   - distance_pc: from Bailer-Jones et al. (2021) EDR3 geometric distance
#   - g_mag: Gaia DR3 phot_g_mean_mag
#   - g_var: Gvar variability indicator (Vioque et al. 2020 definition)
#   - ruwe: Gaia DR3 Renormalised Unit Weight Error
#   - teff_k: Gaia DR3 GSP-Phot effective temperature (K)
#   - ew_h_alpha_nm: Gaia DR3 pseudo-equivalent width of H-alpha (nm),
#                    blank when not significantly detected
#   - t_ds_k: best-fit Dyson sphere blackbody temperature from Suazo
#             et al. fit (K)
#   - gamma: best-fit DS covering factor (Suazo et al. 2024)
#   - snr_w3, snr_w4: AllWISE photometric S/N in W3 and W4 bands
#   - w1_w2_offset_arcsec_ra/dec: photocentre offset between W1 and W2
#   - w1_w3_offset_arcsec_ra/dec: photocentre offset between W1 and W3
#   - iris_100um_mjy_sr: IRIS 100 micron background level at source

